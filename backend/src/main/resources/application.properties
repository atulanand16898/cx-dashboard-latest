# Application
spring.application.name=cxalloy-integration
server.port=${SERVER_PORT:8081}

# ============================================================
#  PostgreSQL Database (HikariCP connection pool)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/cxalloydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:cxalloy}
spring.datasource.password=${DB_PASSWORD:cxalloypass}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# HikariCP Pool Tuning
spring.datasource.hikari.pool-name=CxAlloyHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:8}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=120000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' so schema is preserved across restarts.
# Switch to 'validate' once schema is stable in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Batch inserts -- critical for bulk sync operations
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# CxAlloy API Config
# SECURITY: Set these via environment variables in production. Never commit real secrets to source control.
# Per the CxAlloy API docs (https://api.cxalloy.com):
#   - identifier: from API Keys page in account settings
#   - secret: shown once on key creation; store securely
cxalloy.api.base-url=https://tq.cxalloy.com/api/v1
cxalloy.api.identifier=${CXALLOY_API_IDENTIFIER:}
cxalloy.api.secret=${CXALLOY_API_SECRET:}
facilitygrid.api.base-url=${FACILITYGRID_API_BASE_URL:https://facilitygrid.net}
facilitygrid.api.auth-url=${FACILITYGRID_API_AUTH_URL:/api/v1/oauth/token}
facilitygrid.api.projects-path=${FACILITYGRID_API_PROJECTS_PATH:/api/v2_2/projects}
facilitygrid.api.issues-path-template=${FACILITYGRID_API_ISSUES_PATH_TEMPLATE:/api/v2_2/project/{project_id}/issues}
facilitygrid.api.issue-path-template=${FACILITYGRID_API_ISSUE_PATH_TEMPLATE:/api/v2_2/project/{project_id}/issue/{issue_uuid}}
facilitygrid.api.checklist-path-template=${FACILITYGRID_API_CHECKLIST_PATH_TEMPLATE:/api/v2_2/project/{project_id}/checklist}
facilitygrid.api.checklist-details-path-template=${FACILITYGRID_API_CHECKLIST_DETAILS_PATH_TEMPLATE:/api/v2_2/project/{project_id}/checklist/{test_uuid}/details}
facilitygrid.api.functional-test-path-template=${FACILITYGRID_API_FUNCTIONAL_TEST_PATH_TEMPLATE:/api/v2_2/project/{project_id}/functional_test}
facilitygrid.api.functional-test-details-path-template=${FACILITYGRID_API_FUNCTIONAL_TEST_DETAILS_PATH_TEMPLATE:/api/v2_2/project/{project_id}/functional_test/{test_uuid}/details}
facilitygrid.api.equipment-path-template=${FACILITYGRID_API_EQUIPMENT_PATH_TEMPLATE:/api/v2_2/project/{project_id}/equipment}
facilitygrid.api.equipment-types-path-template=${FACILITYGRID_API_EQUIPMENT_TYPES_PATH_TEMPLATE:/api/v2_2/project/{project_id}/equipment_types}
facilitygrid.api.analytics-tasks-path-template=${FACILITYGRID_API_ANALYTICS_TASKS_PATH_TEMPLATE:/api/v2_2/project/{project_id}/analytics/tasks}
facilitygrid.api.analytics-subtasks-path-template=${FACILITYGRID_API_ANALYTICS_SUBTASKS_PATH_TEMPLATE:/api/v2_2/project/{project_id}/analytics/subtasks}
facilitygrid.api.client-id=${FACILITYGRID_API_CLIENT_ID:}
facilitygrid.api.client-secret=${FACILITYGRID_API_CLIENT_SECRET:}
facilitygrid.api.request-timeout-seconds=${FACILITYGRID_API_REQUEST_TIMEOUT_SECONDS:20}
facilitygrid.api.checklist-sync-timeout-seconds=${FACILITYGRID_API_CHECKLIST_SYNC_TIMEOUT_SECONDS:60}
facilitygrid.api.checklist-status-sync-timeout-seconds=${FACILITYGRID_API_CHECKLIST_STATUS_SYNC_TIMEOUT_SECONDS:60}
copilot.api-key=${OPENAI_API_KEY:}
copilot.default-model=${OPENAI_DEFAULT_MODEL:gpt-5.4}
app.admin.cxalloy-username=${CXALLOY_ADMIN_USERNAME:admin}
app.admin.cxalloy-password=${CXALLOY_ADMIN_PASSWORD:admin123}
app.admin.facilitygrid-username=${FACILITYGRID_ADMIN_USERNAME:fg-admin}
app.admin.facilitygrid-password=${FACILITYGRID_ADMIN_PASSWORD:fgadmin123}
app.leads.notification-recipients=${LEAD_NOTIFICATION_RECIPIENTS:atulanand16898@gmal.com,pmcpolin10@gmail.com}
app.leads.from-address=${LEAD_FROM_ADDRESS:no-reply@modum.local}
app.leads.continue-path=${LEAD_CONTINUE_PATH:/client-access-portal}

# PROJECT ID - fill after first sync
cxalloy.api.project-id=

# JWT Configuration
# SECURITY: Override jwt.secret via JWT_SECRET env var in production.
# Must be at least 256 bits (32 chars). Never commit real secrets to source control.
jwt.secret=${JWT_SECRET:}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# ============================================================
#  CORS Configuration
# ============================================================
# Comma-separated list of allowed origins for CORS.
# In production, set: CORS_ALLOWED_ORIGINS=https://your-frontend.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174,http://127.0.0.1:3000,http://localhost:3000}

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# HTTP client timeouts (ms)
# MVC async timeout: 30s is fine since /sync/all now returns immediately (async background job)
spring.mvc.async.request-timeout=30000

# Log full stack traces -- critical for debugging "future failed: null" issues
logging.level.com.cxalloy=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.web.client.RestTemplate=WARN

# ============================================================
#  Spring Cache (Caffeine) — method-level caching via @Cacheable
# ============================================================
# Spring @Cacheable method-level cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=600s


# ============================================================
#  HTTP Response Compression (gzip) — cuts response size 60-80%
#  for JSON payloads (entity lists, sync stats, reports)
# ============================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/css,text/plain
server.compression.min-response-size=1024

# ============================================================
#  HTTP/1.1 ETag — shallow etag filter auto-computes ETag
#  from response body, returns 304 Not Modified when unchanged.
#  Eliminates redundant response body transfer for polling calls.
# ============================================================
spring.web.resources.cache.cachecontrol.max-age=60s
spring.web.resources.cache.cachecontrol.must-revalidate=true
