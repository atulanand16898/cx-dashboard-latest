# Application
spring.application.name=cxalloy-integration
server.port=${SERVER_PORT:8081}

# ============================================================
#  PostgreSQL Database (HikariCP connection pool)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/cxalloydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:cxalloy}
spring.datasource.password=${DB_PASSWORD:cxalloypass}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# HikariCP Pool Tuning
spring.datasource.hikari.pool-name=CxAlloyHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=120000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' so schema is preserved across restarts.
# Switch to 'validate' once schema is stable in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Batch inserts -- critical for bulk sync operations
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# CxAlloy API Config
# SECURITY: Set these via environment variables in production. Never commit real secrets to source control.
# Per the CxAlloy API docs (https://api.cxalloy.com):
#   - identifier: from API Keys page in account settings
#   - secret: shown once on key creation; store securely
cxalloy.api.base-url=https://tq.cxalloy.com/api/v1
cxalloy.api.identifier=${CXALLOY_API_IDENTIFIER:hyip5fzWysoMsiKZeSuTf4KMc}
cxalloy.api.secret=${CXALLOY_API_SECRET:Ayms5qA9eDg4mONMGPA2wIFdaURQ5jIr5Z0UNGuRBpoQkvrLMQCU2B2Er5}

# PROJECT ID - fill after first sync
cxalloy.api.project-id=

# JWT Configuration
# SECURITY: Override jwt.secret via JWT_SECRET env var in production.
# Must be at least 256 bits (32 chars). Never commit real secrets to source control.
jwt.secret=${JWT_SECRET:cxalloy-super-secret-key-change-in-prod-at-least-256-bits-long!!}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# ============================================================
#  CORS Configuration
# ============================================================
# Comma-separated list of allowed origins for CORS.
# In production, set: CORS_ALLOWED_ORIGINS=https://your-frontend.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://localhost:3000}

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# HTTP client timeouts (ms)
# MVC async timeout: 30s is fine since /sync/all now returns immediately (async background job)
spring.mvc.async.request-timeout=30000

# Log full stack traces -- critical for debugging "future failed: null" issues
logging.level.com.cxalloy=DEBUG
logging.level.org.springframework.web.client.RestTemplate=WARN

# ============================================================
#  Spring Cache (Caffeine) — method-level caching via @Cacheable
# ============================================================
# Spring @Cacheable method-level cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=600s


# ============================================================
#  HTTP Response Compression (gzip) — cuts response size 60-80%
#  for JSON payloads (entity lists, sync stats, reports)
# ============================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/css,text/plain
server.compression.min-response-size=1024

# ============================================================
#  HTTP/1.1 ETag — shallow etag filter auto-computes ETag
#  from response body, returns 304 Not Modified when unchanged.
#  Eliminates redundant response body transfer for polling calls.
# ============================================================
spring.web.resources.cache.cachecontrol.max-age=60s
spring.web.resources.cache.cachecontrol.must-revalidate=true
