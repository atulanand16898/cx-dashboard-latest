services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=40
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-6}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CXALLOY_API_IDENTIFIER: ${CXALLOY_API_IDENTIFIER}
      CXALLOY_API_SECRET: ${CXALLOY_API_SECRET}
      FACILITYGRID_API_CLIENT_ID: ${FACILITYGRID_API_CLIENT_ID:-}
      FACILITYGRID_API_CLIENT_SECRET: ${FACILITYGRID_API_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-5.4}
      APP_FILES_STORAGE_DIR: ${APP_FILES_STORAGE_DIR:-/tmp/project-files}
      XER_PROCESSING_STORAGE_DIR: ${XER_PROCESSING_STORAGE_DIR:-/tmp/xer-processing}
      XER_PROCESSING_PYTHON_COMMAND: ${XER_PROCESSING_PYTHON_COMMAND:-python3}
      XER_PROCESSING_PROCESSOR_SCRIPT: ${XER_PROCESSING_PROCESSOR_SCRIPT:-/app/xer_processing/python/process_baseline.py}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAM=384m -XX:InitialRAMPercentage=20 -XX:+UseSerialGC}
    volumes:
      - project_files_data:/tmp/project-files
      - xer_processing_data:/tmp/xer-processing
    expose:
      - "8081"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  project_files_data:
  xer_processing_data:
  caddy_data:
  caddy_config:
